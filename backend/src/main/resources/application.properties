spring.application.name=genealogy-server
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/genealogy?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Server Size Limits
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB
spring.codec.max-in-memory-size=100MB
server.max-http-header-size=64KB

# JWT Configuration
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-ttl=900000
app.jwt.refresh-token-ttl=2592000000

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173

# Upload Directory
app.upload.dir=uploads
