spring.application.name=genealogy-server
server.port=8080

# MySQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/genealogy?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration（Flyway 管理表结构，Hibernate 只做校验）
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Server Size Limits
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB
spring.codec.max-in-memory-size=100MB
server.max-http-header-size=64KB

# JWT Configuration
# 重要: JWT_SECRET 环境变量是启动必需的。应用启动时会校验，若未设置则直接报错退出。
# 生成密钥: openssl rand -base64 64
app.jwt.secret=${JWT_SECRET:}
app.jwt.access-token-ttl=900000
app.jwt.refresh-token-ttl=2592000000

# CORS Configuration
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Upload Directory
app.upload.dir=uploads

# Cookie Security
# 生产环境（HTTPS）请设为 true；本地开发保持 false
app.secure-cookie=false

# Flyway 数据库版本管理（已有库首次运行自动 baseline，不执行 V1）
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.com.genealogy.server=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
