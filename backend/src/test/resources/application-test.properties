spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
app.jwt.secret=test-secret-key-for-unit-tests-only
app.cors.allowed-origins=http://localhost:5173
app.upload.dir=uploads
spring.codec.max-in-memory-size=100MB
server.tomcat.max-swallow-size=100MB
server.tomcat.max-http-form-post-size=100MB
server.max-http-header-size=64KB
